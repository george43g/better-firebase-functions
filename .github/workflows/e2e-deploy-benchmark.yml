name: E2E Deploy & Benchmark

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      project_id:
        description: Firebase project ID
        required: false
        default: bff-e2e-testing
      run_bundler_smoke:
        description: Also run bundler smoke tests (esbuild/webpack/rollup)
        type: boolean
        required: false
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------------------------
  # BFF vs Static benchmark
  # -------------------------------------------------------------------------
  deploy-benchmark:
    name: Deploy benchmark (BFF vs Static)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BFF_E2E }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret: FIREBASE_SERVICE_ACCOUNT_BFF_E2E"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Run deploy benchmark
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
          PROJECT_ID: ${{ github.event.inputs.project_id || 'bff-e2e-testing' }}
        run: bash e2e/run-deploy-benchmark.sh

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: deploy-benchmark-results
          path: e2e/results/

  # -------------------------------------------------------------------------
  # Bundler smoke tests (esbuild, webpack, rollup)
  # -------------------------------------------------------------------------
  bundler-smoke:
    name: Bundler smoke tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event.inputs.run_bundler_smoke != 'false' }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BFF_E2E }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret: FIREBASE_SERVICE_ACCOUNT_BFF_E2E"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Run bundler smoke tests
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
          PROJECT_ID: ${{ github.event.inputs.project_id || 'bff-e2e-testing' }}
        run: bash e2e/run-bundler-smoke.sh

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bundler-smoke-results
          path: e2e/results/
